name: "Validate Graph"

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "packages/**"
  pull_request:
    branches: [main]
    paths:
      - "data/**"
      - "packages/**"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Knowledge Graph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --package-lock=false

      - name: Run Fiction Atlas regression tests
        run: npm run test:fiction

      - name: Run graph validator
        run: npm run validate
        env:
          NODE_ENV: ci

      - name: Check for private data patterns
        run: |
          echo "Scanning for potential private data patterns..."
          # Check for patterns that suggest personal health/genetic data
          # These are heuristic checks — the Privacy Steward agent does full review
          if grep -rEiw "(SSN|social[ ._-]?security|passport[ ._-]?number|medical[ ._-]?record|patient[ ._-]?id)" data/ --include="*.json"; then
            echo "❌ Potential personal identifier pattern detected in data/"
            exit 1
          fi
          if grep -rE "(GCACTAG|ATCGATCG)" data/ --include="*.json"; then
            echo "❌ Potential DNA sequence detected in data/"
            exit 1
          fi
          echo "✅ No private data patterns detected"

      - name: Validate JSON syntax
        run: |
          echo "Validating JSON syntax in data/..."
          find data/ -name "*.json" | while read file; do
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "❌ Invalid JSON: $file"
              exit 1
            fi
          done
          echo "✅ All JSON files are syntactically valid"

      - name: Post validation summary
        if: always()
        run: |
          echo "## Graph Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Data directory scanned: \`data/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See validator output above for details." >> $GITHUB_STEP_SUMMARY
