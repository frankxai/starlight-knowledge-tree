name: Add Paper
description: Propose a new research paper node for the knowledge tree
title: "[Paper] "
labels: ["paper-proposal", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Add a Research Paper

        Papers must be real, publicly accessible publications with a valid DOI or arXiv URL.
        Do not submit paywalled papers without a publicly accessible preprint.

  - type: input
    id: title
    attributes:
      label: Paper Title
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Authors
      description: Comma-separated list of authors
      placeholder: "Alice Smith, Bob Jones, et al."
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Year
      placeholder: "2023"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL (DOI or arXiv)
      placeholder: "https://arxiv.org/abs/..."
    validations:
      required: true

  - type: textarea
    id: abstract
    attributes:
      label: Abstract (brief)
      description: 1–3 sentence summary of what this paper contributes
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Primary Domain
      options:
        - domain-ai-architect
        - domain-space-builder
        - domain-bio-human-intelligence
        - domain-creator-founder
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      placeholder: "transformers, attention, llm"
    validations:
      required: true

  - type: textarea
    id: edges
    attributes:
      label: Proposed Edges
      description: |
        Which existing nodes does this paper evidence, teach, or update?
        Format: `evidenced_by: concept-id` or `teaches: skill-id`
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: The paper is real and publicly accessible
          required: true
        - label: The URL is valid (DOI or arXiv link)
          required: true
        - label: This paper does not already exist in data/nodes/papers.json
          required: true
