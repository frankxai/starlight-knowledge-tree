name: Add Skill Path
description: Propose a new skill path through the knowledge tree
title: "[Path] "
labels: ["path-proposal", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Add a Skill Path

        A skill path is an ordered sequence of concept and skill nodes that forms a coherent learning journey.
        All node IDs in the path must already exist in the graph. Add missing nodes first using the Add Node template.

  - type: input
    id: id
    attributes:
      label: Path ID
      description: "Must start with 'path-'. Example: path-ai-architect-rag-systems"
      placeholder: "path-domain-name"
    validations:
      required: true

  - type: input
    id: label
    attributes:
      label: Path Label
      description: Human-readable name
      placeholder: "RAG Systems Engineering"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - domain-ai-architect
        - domain-space-builder
        - domain-bio-human-intelligence
        - domain-creator-founder
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1–3 sentences describing what this path teaches and who it is for.
    validations:
      required: true

  - type: textarea
    id: nodes
    attributes:
      label: Node Sequence
      description: |
        Ordered list of node IDs (one per line). Must include at least 3 nodes.
        Example:
        ```
        concept-embeddings
        concept-vector-search
        skill-build-rag-pipeline
        skill-evaluate-rag
        ```
    validations:
      required: true

  - type: textarea
    id: branches
    attributes:
      label: Optional Branches
      description: |
        If this path has branches (e.g., for different use cases), describe them here.
        Format: `condition: [node-id, node-id, ...]`
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: All node IDs in the path already exist in the graph
          required: true
        - label: The path has a logical progression from beginner to more advanced concepts
          required: true
        - label: I have validated the path makes sense as a learning sequence
          required: true
